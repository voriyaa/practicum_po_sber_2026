apiVersion: v1
kind: Service
metadata:
  name: log-storage
spec:
  clusterIP: None
  selector:
    app: log-storage
  ports:
  - port: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: log-storage
spec:
  serviceName: log-storage
  replicas: 1
  selector:
    matchLabels:
      app: log-storage
  template:
    metadata:
      labels:
        app: log-storage
    spec:
      containers:
      - name: log-storage
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "log-storage started"
          while true; do
            TS=$(date +%Y%m%d-%H%M%S)
            wget -qO /data/logs/app-${TS}.log http://custom-app-service/logs 2>/dev/null
            if [ -s /data/logs/app-${TS}.log ]; then
              echo "saved app-${TS}.log"
            else
              rm -f /data/logs/app-${TS}.log
            fi
            sleep 300
          done
        volumeMounts:
        - name: log-data
          mountPath: /data/logs
  volumeClaimTemplates:
  - metadata:
      name: log-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
