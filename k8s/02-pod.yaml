apiVersion: v1
kind: Pod
metadata:
  name: custom-app-pod
  labels:
    app: custom-app
spec:
  containers:
  - name: custom-app
    image: custom-app:latest
    imagePullPolicy: IfNotPresent
    ports:
    - containerPort: 5000
    envFrom:
    - configMapRef:
        name: app-config
    volumeMounts:
    - name: logs
      mountPath: /app/logs
  volumes:
  - name: logs
    emptyDir: {}
