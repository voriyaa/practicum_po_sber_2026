apiVersion: batch/v1
kind: CronJob
metadata:
  name: log-archiver
spec:
  schedule: "*/10 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: archiver
            image: busybox:1.36
            command: ["/bin/sh", "-c"]
            args:
            - |
              TS=$(date +%Y%m%d-%H%M%S)
              mkdir -p /tmp/app-logs
              wget -qO /tmp/app-logs/app.log http://custom-app-service/logs
              if [ -s /tmp/app-logs/app.log ]; then
                tar -czf /tmp/app-logs-${TS}.tar.gz -C /tmp app-logs/app.log
                echo "archive created: /tmp/app-logs-${TS}.tar.gz"
                ls -lh /tmp/app-logs-${TS}.tar.gz
              else
                echo "no logs, skip"
              fi
